<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQAI - Your Systems</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .navbar {
            background: rgba(10, 10, 10, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: 900;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.3);
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff4444 0%, #ff6b6b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .user-name {
            font-size: 14px;
            color: #aaa;
        }

        .btn-logout {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #aaa;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(255, 68, 68, 0.1);
            border-color: #ff4444;
            color: #ff4444;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .dashboard-title {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .dashboard-subtitle {
            font-size: 16px;
            color: #aaa;
        }

        .dashboard-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn-primary {
            padding: 14px 30px;
            background: linear-gradient(135deg, #ff4444 0%, #ff6b6b 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 68, 68, 0.4);
        }

        .systems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 50px;
        }

        .system-card {
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .system-card:hover {
            border-color: #ff4444;
            box-shadow: 0 15px 40px rgba(255, 68, 68, 0.2);
            transform: translateY(-5px);
        }

        .system-type {
            display: inline-block;
            background: rgba(255, 68, 68, 0.1);
            color: #ff8888;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .system-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .system-location {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4eff86;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .system-date {
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
        }

        .system-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-small:hover {
            background: rgba(255, 68, 68, 0.1);
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn-small.delete {
            color: #ff8888;
            border-color: rgba(255, 68, 68, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .empty-text {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 14px;
            color: #aaa;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ff4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .modal-text {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 25px;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .modal-confirm {
            background: linear-gradient(135deg, #ff4444 0%, #ff6b6b 100%);
            color: #fff;
        }

        .modal-confirm:hover {
            box-shadow: 0 10px 30px rgba(255, 68, 68, 0.4);
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 16px 20px;
                flex-direction: column;
                gap: 15px;
            }

            .navbar-right {
                width: 100%;
                justify-content: space-between;
            }

            .dashboard-title {
                font-size: 28px;
            }

            .systems-grid {
                grid-template-columns: 1fr;
            }

            .user-name {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <div class="navbar">
        <div class="navbar-brand">ResQAI</div>
        <div class="navbar-right">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <div class="user-name" id="userName">User</div>
            </div>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">
        <div class="dashboard-header">
            <h1 class="dashboard-title">Your Rescue Systems</h1>
            <p class="dashboard-subtitle">Manage and control all your emergency response systems</p>
            <div class="dashboard-actions">
                <button class="btn-primary" onclick="createNewSystem()">+ Create New System</button>
                <button class="btn-primary" style="background: rgba(100, 150, 255, 0.8);" onclick="viewAllSystems()">📊 View All Systems</button>
            </div>
        </div>

        <div id="systemsList" class="systems-grid"></div>
    </div>

    <!-- DELETE CONFIRMATION MODAL -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">Delete System?</div>
            <div class="modal-text">Are you sure you want to delete this system? This action cannot be undone.</div>
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeDeleteModal()">Cancel</button>
                <button class="modal-confirm" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/custom-system';
        let systems = [];
        let selectedSystemID = null;

        // Check authentication
        async function checkAuth() {
            const token = localStorage.getItem('auth-token');
            if (!token) {
                window.location.href = '/pages/auth.html';
                return false;
            }

            try {
                const response = await fetch('/api/auth/verify', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    localStorage.removeItem('auth-token');
                    window.location.href = '/pages/auth.html';
                    return false;
                }

                return true;
            } catch (error) {
                console.error('Auth verification error:', error);
                return false;
            }
        }

        // Load user systems
        async function loadSystems() {
            try {
                const token = localStorage.getItem('auth-token');
                const response = await fetch(`${API_BASE}/user/list`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to load systems');

                const data = await response.json();
                systems = data.systems || [];

                renderSystems();
            } catch (error) {
                console.error('Error loading systems:', error);
                document.getElementById('systemsList').innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">⚠️</div>
                        <div class="empty-title">Error Loading Systems</div>
                        <div class="empty-text">${error.message}</div>
                    </div>
                `;
            }
        }

        // Render systems
        function renderSystems() {
            const list = document.getElementById('systemsList');

            if (systems.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">🚀</div>
                        <div class="empty-title">No Systems Yet</div>
                        <div class="empty-text">Create your first rescue system to get started</div>
                        <button class="btn-primary" onclick="createNewSystem()">Create System</button>
                    </div>
                `;
                return;
            }

            list.innerHTML = systems.map(sys => `
                <div class="system-card">
                    <div class="system-type">${sys.organization_type}</div>
                    <div class="system-name">${sys.organization_name}</div>
                    <div class="system-location">📍 ${sys.location}</div>
                    <div class="system-status">
                        <div class="status-dot"></div>
                        <span>${sys.status || 'Active'}</span>
                    </div>
                    <div class="system-date">Created: ${new Date(sys.created_at).toLocaleDateString()}</div>
                    <div class="system-actions">
                        <button class="btn-small" onclick="openSystem('${sys.id}')">Open</button>
                        <button class="btn-small delete" onclick="deleteSystem('${sys.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Create new system
        function createNewSystem() {
            window.location.href = '/pages/index.html?mode=builder';
        }

        // Open system
        function openSystem(systemID) {
            window.location.href = `/pages/index.html?mode=system&id=${systemID}`;
        }

        // Delete system
        function deleteSystem(systemID) {
            selectedSystemID = systemID;
            document.getElementById('deleteModal').classList.add('show');
        }

        // Close delete modal
        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
            selectedSystemID = null;
        }

        // Confirm delete
        async function confirmDelete() {
            try {
                const token = localStorage.getItem('auth-token');
                const response = await fetch(`${API_BASE}/${selectedSystemID}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to delete system');

                closeDeleteModal();
                systems = systems.filter(s => s.id !== selectedSystemID);
                renderSystems();
            } catch (error) {
                alert('Error deleting system: ' + error.message);
            }
        }

        // View all systems (admin)
        function viewAllSystems() {
            window.location.href = '/pages/admin.html';
        }

        // Logout
        function logout() {
            localStorage.removeItem('auth-token');
            localStorage.removeItem('user');
            window.location.href = '/pages/auth.html';
        }

        // Load user info
        function loadUserInfo() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.firstName) {
                document.getElementById('userName').textContent = user.firstName;
                document.getElementById('userAvatar').textContent = user.firstName.charAt(0).toUpperCase();
            }
        }

        // Initialize
        async function init() {
            if (await checkAuth()) {
                loadUserInfo();
                await loadSystems();
            }
        }

        init();
    </script>
</body>
</html>
