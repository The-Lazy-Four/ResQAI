<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQAI - Reset Password</title>
    <style>
        :root { --bg: #081018; --card: #f6f8fb; --text: #f5f7fb; --muted: #8fa1b5; --line: rgba(255,255,255,0.12); --accent: #e63946; --accent-dark: #ba2734; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, rgba(230,57,70,0.18), transparent 28%), linear-gradient(135deg, #081018 0%, #0d1520 42%, #121c28 100%);
            color: var(--text);
        }
        .corner-back {
            position: fixed; top: 18px; left: 18px; z-index: 20; display: inline-flex; align-items: center; gap: 10px;
            padding: 11px 15px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); background: rgba(8,16,24,0.76);
            color: #f5f7fb; text-decoration: none; font-size: 0.92rem; font-weight: 700; backdrop-filter: blur(12px);
        }
        .layout { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 18px; }
        .card-shell { width: min(520px, 100%); background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 18px; box-shadow: 0 30px 70px rgba(0,0,0,0.35); }
        .auth-card { background: var(--card); color: #18222f; border-radius: 22px; padding: 34px; }
        .eyebrow { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(230,57,70,0.08); color: var(--accent); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
        h1 { margin-top: 18px; font-size: 2rem; line-height: 1.05; }
        .lead { margin-top: 10px; color: #5e6d7f; line-height: 1.6; }
        .status { display: none; margin-top: 18px; padding: 14px 16px; border-radius: 14px; font-size: 0.95rem; line-height: 1.45; }
        .status.show { display: block; }
        .status.error { background: rgba(230,57,70,0.1); color: #9d1d28; border: 1px solid rgba(230,57,70,0.22); }
        .status.success { background: rgba(43,153,92,0.1); color: #1f6d43; border: 1px solid rgba(43,153,92,0.2); }
        form { margin-top: 28px; display: grid; gap: 18px; }
        .field { display: grid; gap: 8px; }
        label { font-size: 0.86rem; font-weight: 700; color: #2a3542; }
        input {
            width: 100%; border-radius: 14px; border: 1px solid rgba(24,34,47,0.14); padding: 14px 16px; font-size: 1rem;
            color: #18222f; background: #fff; outline: none;
        }
        .submit {
            border: none; border-radius: 16px; padding: 15px 18px; background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
        }
        .footer-link { margin-top: 22px; color: #627082; font-size: 0.96rem; text-align: center; }
        .footer-link a { color: var(--accent); font-weight: 700; text-decoration: none; }
    </style>
</head>

<body>
    <a id="backButton" class="corner-back" href="/pages/admin-login.html">&lt; Back</a>
    <div class="layout">
        <div class="card-shell">
            <div class="auth-card">
                <div class="eyebrow">Password Reset</div>
                <h1>Create a new password</h1>
                <p class="lead">Use a fresh password for your admin account, then sign back in normally.</p>
                <div id="errorMsg" class="status error"></div>
                <div id="successMsg" class="status success"></div>
                <form id="resetForm">
                    <div class="field">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" placeholder="Minimum 6 characters" minlength="6" required>
                    </div>
                    <div class="field">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Repeat your new password" minlength="6" required>
                    </div>
                    <button type="submit" class="submit">Save New Password</button>
                </form>
                <p class="footer-link">Return to <a id="loginLink" href="/pages/admin-login.html">admin login</a></p>
            </div>
        </div>
    </div>
    <script>
        const API_BASE = '/api/auth';
        const params = new URLSearchParams(window.location.search);
        const nextUrl = params.get('next') || '/modules/rescue-builder/pages/custom-builder-dashboard.html';
        const token = params.get('token') || '';
        const loginLink = document.getElementById('loginLink');
        const backButton = document.getElementById('backButton');

        loginLink.href = `/pages/admin-login.html?next=${encodeURIComponent(nextUrl)}`;
        backButton.href = loginLink.href;

        function clearMessages() {
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
        }

        function showError(message) {
            const el = document.getElementById('errorMsg');
            el.textContent = message;
            el.classList.add('show');
        }

        function showSuccess(message) {
            const el = document.getElementById('successMsg');
            el.textContent = message;
            el.classList.add('show');
        }

        if (!token) {
            showError('This reset link is missing its token. Please request a new one.');
        }

        document.getElementById('resetForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            clearMessages();

            if (!token) {
                showError('This reset link is missing its token. Please request a new one.');
                return;
            }

            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            const button = event.target.querySelector('.submit');
            button.disabled = true;
            button.textContent = 'Saving...';

            try {
                const response = await fetch(`${API_BASE}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Unable to reset password');

                showSuccess(data.message || 'Password updated successfully.');
                setTimeout(() => {
                    window.location.href = `/pages/admin-login.html?next=${encodeURIComponent(nextUrl)}&reset=success`;
                }, 1100);
            } catch (error) {
                showError(error.message || 'Unable to reset password');
                button.disabled = false;
                button.textContent = 'Save New Password';
            }
        });
    </script>
</body>

</html>
