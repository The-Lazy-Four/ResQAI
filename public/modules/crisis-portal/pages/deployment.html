<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ResQAI | Deployment</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0e14;
        }

        .font-headline {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>

<body class="bg-background text-on-background">
    <!-- SIDE NAV BAR -->
    <aside
        class="fixed left-0 top-0 h-screen flex flex-col z-40 bg-[#0a0e14]/60 backdrop-blur-2xl border-r border-white/5 w-72">
        <div class="px-8 py-10">
            <a href="/pages/module-selection.html" title="Go back">
                <h1 class="text-xl font-black text-rose-500 font-headline">ResQAI</h1>
            </a>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a class="flex items-center gap-4 text-slate-500 py-4 px-6 font-headline text-[12px] hover:text-cyan-400"
                href="/modules/crisis-portal/pages/command-center.html">
                <span class="material-symbols-outlined">dashboard</span><span>Command Center</span>
            </a>
            <a class="flex items-center gap-4 text-slate-500 py-4 px-6 font-headline text-[12px] hover:text-cyan-400"
                href="/modules/crisis-portal/pages/live-intel.html">
                <span class="material-symbols-outlined">biotech</span><span>Live Intel</span>
            </a>
            <a class="flex items-center gap-4 bg-gradient-to-r from-rose-500/20 text-rose-400 border-l-4 border-rose-500 py-4 px-6 font-headline text-[12px]"
                href="/modules/crisis-portal/pages/deployment.html">
                <span class="material-symbols-outlined">local_fire_department</span><span>Deployment</span>
            </a>
            <a class="flex items-center gap-4 text-slate-500 py-4 px-6 font-headline text-[12px] hover:text-cyan-400"
                href="/modules/crisis-portal/pages/signal-hub.html">
                <span class="material-symbols-outlined">sensors</span><span>Signal Hub</span>
            </a>
            <a class="flex items-center gap-4 text-slate-500 py-4 px-6 font-headline text-[12px] hover:text-cyan-400"
                href="/modules/crisis-portal/pages/archive.html">
                <span class="material-symbols-outlined">folder_open</span><span>Archive</span>
            </a>
        </nav>
    </aside>

    <main class="ml-72 min-h-screen flex flex-col">
        <!-- TOP APP BAR -->
        <header
            class="sticky top-0 z-30 flex justify-between items-center w-full px-8 py-4 h-20 bg-slate-950/40 backdrop-blur-xl border-b border-white/10">
            <h1 class="text-2xl font-headline font-black">🚑 UNIT DEPLOYMENT STATUS</h1>
            <p class="font-headline font-bold text-lg">14:42:09 UTC</p>
        </header>

        <!-- MAIN CONTENT -->
        <div class="p-8 flex-1">
            <div class="grid grid-cols-3 gap-6">
                <!-- ACTIVE UNITS -->
                <div class="bg-surface-container-low rounded-2xl p-6 border border-white/5">
                    <h2 class="font-headline font-black text-lg mb-4">🟢 IDLE</h2>
                    <div id="idleUnits" class="space-y-3"></div>
                </div>

                <!-- EN ROUTE -->
                <div class="bg-surface-container-low rounded-2xl p-6 border border-white/5">
                    <h2 class="font-headline font-black text-lg mb-4">🔵 EN ROUTE</h2>
                    <div id="enRouteUnits" class="space-y-3"></div>
                </div>

                <!-- ACTIVE -->
                <div class="bg-surface-container-low rounded-2xl p-6 border border-white/5">
                    <h2 class="font-headline font-black text-lg mb-4">🔴 ACTIVE</h2>
                    <div id="activeUnits" class="space-y-3"></div>
                </div>
            </div>

            <!-- UNIT DETAILS TABLE -->
            <div class="mt-8 bg-surface-container-low rounded-2xl p-6 border border-white/5">
                <h2 class="font-headline font-black text-lg mb-4">All Units</h2>
                <div id="unitsTable" class="space-y-2"></div>
            </div>
        </div>
    </main>

    <script type="module" src="/modules/crisis-portal/scripts/main.js"></script>

    <script type="module">
        import { initDeployment } from '/modules/crisis-portal/scripts/deploymentInit.js';
        initDeployment();
    </script>
</body>

</html>
