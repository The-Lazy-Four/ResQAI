<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPlus Hotel Emergency Module</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .echo-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
        }

        .echo-back-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(10, 10, 10, 0.98);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 9998;
            display: flex;
            align-items: center;
            padding: 0 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .back-btn {
            background: linear-gradient(135deg, #ff4444 0%, #ff8844 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.3);
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 68, 68, 0.4);
        }

        .back-btn:active {
            transform: scale(0.98);
        }

        .echo-branding {
            margin-left: auto;
            font-size: 12px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .echo-status {
            width: 8px;
            height: 8px;
            background: #4fa743;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 5px #4fa743;
            }

            50% {
                opacity: 0.6;
                box-shadow: 0 0 10px #4fa743;
            }
        }

        .echo-content {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #0a0a0a;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #888;
            z-index: 1000;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 68, 68, 0.2);
            border-top-color: #ff4444;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="echo-wrapper">
        <!-- Back Bar -->
        <div class="echo-back-bar">
            <button class="back-btn" onclick="goBackToEcho()">← Back to ResQAI</button>
            <div class="echo-branding">
                <div class="echo-status"></div>
                <span>ECHO+ v2.0 - Hotel Emergency Module</span>
            </div>
        </div>

        <!-- Content Area with Loading Indicator -->
        <div class="echo-content">
            <div class="loading" id="loading-indicator">
                <div class="spinner"></div>
                <p>Loading EcoPlus Module...</p>
            </div>
            <!-- iframe loads the actual EcoPlus index.html -->
            <iframe id="echo-iframe" src="./index.html" title="EcoPlus Module"></iframe>
        </div>
    </div>

    <script>
        console.log('🏨 [Wrapper] EcoPlus Wrapper Initializing...');

        // ============================================================
        // Bridge between wrapper and EcoPlus module
        // ============================================================

        // Initialize APP_STATE from parent ResQAI
        window.APP_STATE = window.parent.APP_STATE || {
            mode: 'hotel',
            userLocation: null,
            language: 'en'
        };

        APP_STATE.mode = 'hotel';
        console.log('📊 [Wrapper] APP_STATE initialized:', APP_STATE);

        // Handle back button click
        function goBackToEcho() {
            console.log('← [Wrapper] Back button clicked');
            if (window.parent && window.parent.goBackFromEcoPlus) {
                window.parent.goBackFromEcoPlus();
            } else {
                console.warn('⚠️ Parent function not available, using history');
                window.history.back();
            }
        }

        // Hide loading indicator when iframe loads
        const iframe = document.getElementById('echo-iframe');
        const loadingIndicator = document.getElementById('loading-indicator');

        iframe.onload = () => {
            console.log('✅ [Wrapper] EcoPlus iframe loaded successfully');
            loadingIndicator.style.display = 'none';

            // Try to sync APP_STATE with iframe
            try {
                if (iframe.contentWindow && iframe.contentWindow.APP_STATE) {
                    iframe.contentWindow.APP_STATE = window.APP_STATE;
                    console.log('📊 [Wrapper] Synced APP_STATE with iframe');
                }
            } catch (e) {
                console.warn('⚠️ [Wrapper] Could not sync APP_STATE (likely due to same-origin):', e.message);
            }
        };

        iframe.onerror = (error) => {
            console.error('❌ [Wrapper] Failed to load iframe:', error);
            loadingIndicator.innerHTML = `
                <div style="color: #ff4444;">
                    <p>❌ Failed to load EcoPlus Module</p>
                    <p style="font-size: 12px; color: #888; margin-top: 10px;">Please try again or contact support</p>
                </div>
            `;
        };

        // ============================================================
        // Global Error Handling
        // ============================================================

        window.addEventListener('error', (event) => {
            console.error('🔴 [Wrapper] Error caught:', {
                message: event.message,
                source: event.filename,
                lineno: event.lineno,
                error: event.error
            });
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error('🔴 [Wrapper] Unhandled rejection:', event.reason);
        });

        // Log wrapper initialization complete
        console.log('✅ [Wrapper] EcoPlus Wrapper ready. Iframe loading: ./index.html');
    </script>
</body>

</html>
